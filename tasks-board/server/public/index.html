<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks Board</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #242836;
  --border: #2e3348; --text: #e2e4eb; --text2: #8b8fa3;
  --accent: #6c8aff; --accent2: #4f6bdf;
  --high: #ff6b6b; --med: #ffa94d; --low: #69db7c; --done: #51cf66;
  --radius: 8px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
[data-theme="light"] {
  --bg: #f5f6fa; --surface: #fff; --surface2: #eef0f6;
  --border: #d8dae5; --text: #1a1d27; --text2: #6b7085;
  --accent: #4f6bdf; --accent2: #3b54c4;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

/* Layout */
.shell { display: flex; height: 100vh; }
.sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; flex-shrink: 0; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.toolbar { padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* Sidebar */
.logo { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 20px; letter-spacing: 0.5px; }
.epic-list { list-style: none; }
.epic-item { padding: 8px 12px; border-radius: var(--radius); cursor: pointer; font-size: 13px; color: var(--text2); margin-bottom: 2px; display: flex; justify-content: space-between; }
.epic-item:hover { background: var(--surface2); color: var(--text); }
.epic-item.active { background: var(--accent); color: #fff; }
.epic-item .count { font-size: 11px; opacity: 0.7; }
.epic-all { font-weight: 600; color: var(--text); }

/* Toolbar */
.filter-group { display: flex; gap: 4px; }
.filter-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-size: 12px; }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.spacer { flex: 1; }
.icon-btn { background: none; border: 1px solid var(--border); color: var(--text2); padding: 6px 10px; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
.icon-btn:hover { background: var(--surface2); color: var(--text); }

/* Task cards */
.task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.task-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: border-color 0.15s; }
.task-card:hover { border-color: var(--accent); }
.task-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.task-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.task-title { font-size: 14px; font-weight: 600; flex: 1; }
.priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.priority-dot.high { background: var(--high); }
.priority-dot.medium { background: var(--med); }
.priority-dot.low { background: var(--low); }
.task-meta { font-size: 12px; color: var(--text2); display: flex; gap: 12px; margin-bottom: 8px; }
.status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--surface2); color: var(--text2); text-transform: capitalize; }
.subtask-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.subtask-fill { height: 100%; background: var(--done); transition: width 0.3s; }

/* Detail panel */
.detail-panel { position: fixed; top: 0; right: -480px; width: 480px; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); transition: right 0.2s; z-index: 100; display: flex; flex-direction: column; box-shadow: -4px 0 20px rgba(0,0,0,0.3); }
.detail-panel.open { right: 0; }
.detail-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.detail-header h2 { flex: 1; font-size: 16px; }
.detail-body { flex: 1; overflow-y: auto; padding: 20px; }
.detail-section { margin-bottom: 20px; }
.detail-section h3 { font-size: 12px; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; letter-spacing: 0.5px; }
.detail-field { font-size: 14px; line-height: 1.6; }
.detail-field textarea { width: 100%; min-height: 80px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 8px; font-family: var(--font); font-size: 13px; resize: vertical; }
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.meta-item { padding: 8px; background: var(--surface2); border-radius: var(--radius); }
.meta-item label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; }
.meta-item select, .meta-item input { width: 100%; background: transparent; border: none; color: var(--text); font-size: 13px; font-family: var(--font); }
.meta-item select { cursor: pointer; }
.meta-item select option { background: var(--surface); }

/* Subtask list */
.subtask-list { list-style: none; }
.subtask-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.subtask-item:last-child { border-bottom: none; }
.subtask-check { width: 16px; height: 16px; border: 2px solid var(--border); border-radius: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.subtask-check.done { background: var(--done); border-color: var(--done); }
.subtask-check.done::after { content: '✓'; color: #fff; font-size: 10px; }
.subtask-label.done { text-decoration: line-through; color: var(--text2); }

/* Overlay */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; display: none; }
.overlay.open { display: block; }

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

/* Error state */
.error-banner { background: #2d1215; border: 1px solid #5c2328; padding: 16px; border-radius: var(--radius); margin-bottom: 16px; }
.error-banner code { font-size: 12px; background: var(--surface2); padding: 2px 6px; border-radius: 4px; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .detail-panel { width: 100%; right: -100%; }
  .task-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="shell">
  <nav class="sidebar">
    <div class="logo">⬡ TASKS BOARD</div>
    <ul class="epic-list" id="epicList"></ul>
  </nav>

  <div class="main">
    <div class="toolbar">
      <div class="filter-group" id="filters"></div>
      <div class="spacer"></div>
      <button class="icon-btn" id="themeBtn" title="Toggle theme">◐</button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="detail-panel" id="detail"></div>

<script>
const API = `${location.origin}/api`

// ── State ──
let epics = []
let tasks = []
let prefs = { sortOrder: [], fontSize: 18, theme: 'dark' }
let activeEpic = null  // null = all
let activeFilter = 'all'
let selectedTask = null
let saving = false

// ── API helpers ──
async function api(path, opts = {}) {
  const res = await fetch(`${API}${path}`, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  })
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`)
  return res.json()
}

// ── Init ──
async function init() {
  try {
    ;[epics, tasks, prefs] = await Promise.all([
      api('/epics'), api('/tasks'), api('/prefs'),
    ])
    applyTheme(prefs.theme || 'dark')
    renderSidebar()
    renderToolbar()
    renderTasks()
  } catch (err) {
    document.getElementById('content').innerHTML = `
      <div class="error-banner">
        <h3 style="margin-bottom:8px">Connection Error</h3>
        <p style="font-size:13px;color:var(--text2)">Could not reach the server at <code>localhost:${location.port || 3456}</code>.</p>
        <p style="font-size:13px;color:var(--text2);margin-top:8px">Start it with: <code>node server.js</code></p>
      </div>`
  }
}

// ── Sidebar ──
function renderSidebar() {
  const el = document.getElementById('epicList')
  const counts = {}
  for (const t of tasks) counts[t.epicId] = (counts[t.epicId] || 0) + 1

  el.innerHTML = `
    <li class="epic-item epic-all ${activeEpic === null ? 'active' : ''}" data-epic="">
      All Tasks <span class="count">${tasks.length}</span>
    </li>
    ${epics.map(e => `
      <li class="epic-item ${activeEpic === e.id ? 'active' : ''}" data-epic="${e.id}">
        ${e.name} <span class="count">${counts[e.id] || 0}</span>
      </li>
    `).join('')}
  `
  el.querySelectorAll('.epic-item').forEach(li => {
    li.onclick = () => { activeEpic = li.dataset.epic || null; renderSidebar(); renderTasks() }
  })
}

// ── Toolbar ──
function renderToolbar() {
  const filters = ['all', 'todo', 'in-progress', 'done']
  document.getElementById('filters').innerHTML = filters.map(f =>
    `<button class="filter-btn ${activeFilter === f ? 'active' : ''}" data-f="${f}">${f === 'all' ? 'All' : f}</button>`
  ).join('')

  document.getElementById('filters').querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => { activeFilter = btn.dataset.f; renderToolbar(); renderTasks() }
  })

  document.getElementById('themeBtn').onclick = toggleTheme
}

// ── Task list ──
function renderTasks() {
  let filtered = tasks.slice()
  if (activeEpic) filtered = filtered.filter(t => t.epicId === activeEpic)
  if (activeFilter !== 'all') filtered = filtered.filter(t => t.status === activeFilter)

  const el = document.getElementById('content')

  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty"><h2>No tasks</h2><p>${tasks.length === 0 ? 'Task directory is empty' : 'Try changing filters'}</p></div>`
    return
  }

  el.innerHTML = `<div class="task-grid">${filtered.map(t => {
    const total = t.subtasks.length
    const done = t.subtasks.filter(s => s.done).length
    const pct = total ? Math.round(done / total * 100) : 0
    return `
      <div class="task-card ${selectedTask?.id === t.id ? 'selected' : ''}" data-id="${t.id}">
        <div class="task-header">
          <div class="priority-dot ${t.priority}"></div>
          <div class="task-title">${esc(t.title)}</div>
        </div>
        <div class="task-meta">
          <span class="status-badge">${t.status}</span>
          <span>${epicName(t.epicId)}</span>
          ${total ? `<span>${done}/${total}</span>` : ''}
        </div>
        ${total ? `<div class="subtask-bar"><div class="subtask-fill" style="width:${pct}%"></div></div>` : ''}
      </div>`
  }).join('')}</div>`

  el.querySelectorAll('.task-card').forEach(card => {
    card.onclick = () => openDetail(tasks.find(t => t.id === card.dataset.id))
  })
}

// ── Detail panel ──
function openDetail(task) {
  selectedTask = task
  renderTasks()

  const el = document.getElementById('detail')
  const total = task.subtasks.length
  const done = task.subtasks.filter(s => s.done).length

  el.innerHTML = `
    <div class="detail-header">
      <h2>${esc(task.title)}</h2>
      <button class="icon-btn" id="closeDetail">✕</button>
    </div>
    <div class="detail-body">
      <div class="detail-section">
        <h3>Description</h3>
        <div class="detail-field">
          <textarea id="descField">${esc(task.description || '')}</textarea>
        </div>
      </div>

      <div class="detail-section">
        <h3>Properties</h3>
        <div class="meta-grid">
          <div class="meta-item">
            <label>Priority</label>
            <select id="metaPriority">
              ${['high','medium','low'].map(p => `<option ${task.priority===p?'selected':''}>${p}</option>`).join('')}
            </select>
          </div>
          <div class="meta-item">
            <label>Status</label>
            <select id="metaStatus">
              ${['todo','in-progress','done','blocked'].map(s => `<option ${task.status===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </div>
          <div class="meta-item">
            <label>Epic</label>
            <input value="${epicName(task.epicId)}" disabled>
          </div>
          <div class="meta-item">
            <label>File</label>
            <input value="${task.filePath}" disabled style="font-size:11px;font-family:monospace">
          </div>
        </div>
      </div>

      ${total ? `
      <div class="detail-section">
        <h3>Subtasks (${done}/${total})</h3>
        <ul class="subtask-list" id="subtaskList">
          ${task.subtasks.map((s, i) => `
            <li class="subtask-item" data-idx="${i}">
              <div class="subtask-check ${s.done ? 'done' : ''}"></div>
              <span class="subtask-label ${s.done ? 'done' : ''}">${esc(s.label)}</span>
            </li>
          `).join('')}
        </ul>
      </div>` : ''}
    </div>
  `

  el.classList.add('open')
  document.getElementById('overlay').classList.add('open')

  // Bind events
  document.getElementById('closeDetail').onclick = closeDetail
  document.getElementById('overlay').onclick = closeDetail

  document.getElementById('descField').onblur = () => saveCurrentTask()
  document.getElementById('metaPriority').onchange = () => saveCurrentTask()
  document.getElementById('metaStatus').onchange = () => saveCurrentTask()

  document.querySelectorAll('#subtaskList .subtask-check').forEach(chk => {
    chk.onclick = (e) => {
      e.stopPropagation()
      const idx = +chk.parentElement.dataset.idx
      selectedTask.subtasks[idx].done = !selectedTask.subtasks[idx].done
      saveCurrentTask()
      openDetail(selectedTask) // re-render
    }
  })
}

function closeDetail() {
  selectedTask = null
  document.getElementById('detail').classList.remove('open')
  document.getElementById('overlay').classList.remove('open')
  renderTasks()
}

async function saveCurrentTask() {
  if (!selectedTask || saving) return
  saving = true

  // Read from DOM
  selectedTask.description = document.getElementById('descField')?.value || ''
  selectedTask.priority = document.getElementById('metaPriority')?.value || 'medium'
  selectedTask.status = document.getElementById('metaStatus')?.value || 'todo'

  try {
    const [epicId, slug] = selectedTask.id.split('/')
    const updated = await api(`/tasks/${epicId}/${slug}`, { method: 'PUT', body: selectedTask })
    // Update local state
    const idx = tasks.findIndex(t => t.id === updated.id)
    if (idx !== -1) tasks[idx] = updated
    selectedTask = updated
    renderSidebar()
  } catch (err) {
    console.error('Save failed:', err)
  }
  saving = false
}

// ── Theme ──
function applyTheme(theme) {
  document.documentElement.dataset.theme = theme === 'light' ? 'light' : ''
  prefs.theme = theme
}

async function toggleTheme() {
  const next = prefs.theme === 'dark' ? 'light' : 'dark'
  applyTheme(next)
  await api('/prefs', { method: 'PATCH', body: { theme: next } })
}

// ── Helpers ──
function epicName(id) { return epics.find(e => e.id === id)?.name || id }
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML }

// ── Go ──
init()
</script>
</body>
</html>
